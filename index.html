<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
  padding-bottom: 120px;
}

h1 {
  background: #25D366;
  color: white;
  padding: 20px;
  margin: 0;
  text-align: center;
}

/* MENU */
.categorias {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.categorias button {
  background: #eee;
  border-radius: 20px;
  padding: 10px;
  border: none;
  cursor: pointer;
}

/* CONTAINER */
.container {
  padding: 15px;
  padding-bottom: 220px;
}

.produto {
  background: white;
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.produto img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  background: #25D366;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  width: 100%;
  margin-top: 10px;
}

/* CARRINHO */
#carrinho {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 2px solid #ddd;
}

/* BOTÃO WHATS */
#finalizar {
  position: fixed;
  bottom: 90px;
  right: 15px;
  padding: 15px;
  border-radius: 50px;
  background: #25D366;
  color: white;
  border: none;
}

/* ESCONDER */
.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>🍔 Lanchonete da Jana</h1>

<div class="categorias">
  <button onclick="mostrar('lanches')">🍔 Lanches</button>
  <button onclick="mostrar('bebidas')">🥤 Bebidas</button>
  <button onclick="mostrar('extras')">➕ Extras</button>
</div>

<div class="container">

<!-- LANCHES -->
<div id="lanches">
<h2>🍔 Lanches</h2>

<div class="produto">
<h3>X-Burger</h3>
<p>R$ 15</p>
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>

<div class="produto">
<h3>Bauru</h3>
<p>R$ 14</p>
<input class="obs" placeholder="Observação">
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>

<div class="produto">
<h3>Cachorro Quente</h3>
<p>R$ 12</p>
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>
</div>

<!-- BEBIDAS -->
<div id="bebidas" class="hidden">
<h2>🥤 Bebidas</h2>

<div class="produto">
<h3>Coca-Cola</h3>
<p>R$ 8</p>
<input class="obs" placeholder="Observação">
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>
</div>

<!-- EXTRAS -->
<div id="extras" class="hidden">
<h2>➕ Adicionais</h2>

<label><input type="checkbox" value="Queijo" data-preco="2"> Queijo (+2)</label><br>
<label><input type="checkbox" value="Bacon" data-preco="3"> Bacon (+3)</label><br>
<label><input type="checkbox" value="Ovo" data-preco="2"> Ovo (+2)</label>

</div>

</div>

<!-- CARRINHO -->
<div id="carrinho">
<ul id="lista"></ul>
<p id="total">Total: R$ 0</p>
<button onclick="limpar()">Limpar</button>
</div>

<button id="finalizar" onclick="whats()">📲 Pedir</button>

<script>
let carrinho = [];
let total = 0;

function mostrar(sec){
  document.getElementById("lanches").classList.add("hidden");
  document.getElementById("bebidas").classList.add("hidden");
  document.getElementById("extras").classList.add("hidden");

  document.getElementById(sec).classList.remove("hidden");
}

function adicionar(nome, preco){
  let item = carrinho.find(i => i.nome === nome);

  if(item){
    item.qtd++;
  } else {
    carrinho.push({nome, preco, qtd:1});
  }

  total += preco;
  atualizar();
}

function atualizar(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  carrinho.forEach(i=>{
    let li = document.createElement("li");
    li.textContent = `${i.nome} (${i.qtd}x) - R$ ${i.preco * i.qtd}`;
    lista.appendChild(li);
  });

  document.getElementById("total").textContent = "Total: R$ " + total;
}

function limpar(){
  carrinho = [];
  total = 0;
  atualizar();
}

function adicionarComExtras(btn){
  let p = btn.parentElement;

  let nome = p.querySelector("h3").textContent;
  let preco = parseFloat(p.querySelector("p").textContent.replace("R$ ",""));

  let obs = p.querySelector(".obs")?.value || "";

  let extras = document.querySelectorAll("#extras input:checked");

  let nomesExtras = [];

  extras.forEach(e=>{
    nomesExtras.push(e.value);
    preco += parseFloat(e.dataset.preco);
  });

  if(nomesExtras.length > 0){
    nome += " + " + nomesExtras.join(", ");
  }

  if(obs.trim()){
    nome += " (" + obs + ")";
  }

  adicionar(nome, preco);
}

function whats(){
  let msg = "Pedido:\n";

  carrinho.forEach(i=>{
    msg += `- ${i.nome} (${i.qtd}x)\n`;
  });

  msg += "\nTotal: R$ " + total;

  window.open(`https://wa.me/53999816127?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
