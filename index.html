<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
  padding-bottom: 100px; /* corrigido */
}

h1 {
  background: #25D366;
  color: white;
  padding: 20px;
  margin: 0;
  text-align: center;
}

/* MENU DE CATEGORIAS */
.categorias {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: white;
  overflow-x: auto;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.categorias button {
  background: #eee;
  color: black;
  border-radius: 20px;
  padding: 10px 15px;
  border: none;
  white-space: nowrap;
  cursor: pointer;
}

.container {
  padding: 15px;
  padding-bottom: 180px; 
}

.produto {
  background: white;
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.produto img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  background: #25D366;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  width: 100%;
  margin-top: 10px;
}

/* CARRINHO */
#carrinho {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 2px solid #ddd;
  z-index: 999;
}

/* BOTÃO WHATSAPP */
#finalizar {
  position: fixed;
  bottom: 20px;
  right: 15px;
  padding: 15px 20px;
  border-radius: 50px;
  font-size: 16px;
  background-color: #25D366;
  color: white;
  border: none;
  z-index: 1000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  cursor: pointer;
}

#finalizar:hover {
  background-color: #1ebe5d;
}

/* MOBILE */
@media (max-width: 600px) {
  #finalizar {
    bottom: 200px;
  }

  .container {
    padding-bottom: 220px;
  }
}
</style>
</head>

<body>

<h1>🍔 Lanchonete da Jana</h1>

<!-- CATEGORIAS -->
<div class="categorias">
  <button onclick="mostrarCategoria('lanches')">🍔 Lanches</button>
  <button onclick="mostrarCategoria('bebidas')">🥤 Bebidas</button>
  <button onclick="mostrarCategoria('extras')">➕ Extras</button>
</div>

<div class="container">

<!-- LANCHES -->
<div id="lanches">
<h2>🍔 Lanches</h2>

<div class="produto">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=500">
<h2>X-Burger</h2>
<p>R$ 15</p>
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1606755456206-b25206cde27e">
<h2>Bauru</h2>
<p>R$ 14</p>
<input type="text" placeholder="Observação" class="obs">
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1551782450-17144efb9c50">
<h2>Cachorro Quente</h2>
<p>R$ 12</p>
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>
</div>

<!-- BEBIDAS -->
<div id="bebidas">
<h2>🥤 Bebidas</h2>

<div class="produto">
<img src="https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=500">
<h2>Coca-Cola</h2>
<p>R$ 8</p>
<input type="text" placeholder="Observação" class="obs">
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>

</div>

<!-- EXTRAS -->
<div id="extras">
<h2>➕ Adicionais</h2>

<label><input type="checkbox" value="Queijo" data-preco="2"> Queijo (+2)</label><br>
<label><input type="checkbox" value="Bacon" data-preco="3"> Bacon (+3)</label><br>
<label><input type="checkbox" value="Ovo" data-preco="2"> Ovo (+2)</label>

</div>

</div>

<!-- CARRINHO -->
<div id="carrinho">
<ul id="lista"></ul>
<p id="total">Total: R$ 0</p>
<button onclick="limparCarrinho()">Limpar</button>
</div>

<!-- BOTÃO -->
<button id="finalizar" onclick="finalizarPedido()">
📲 Pedir no WhatsApp
</button>

<script>
let carrinho = [];
let total = 0;

function mostrarCategoria(categoria){
  document.getElementById("lanches").style.display = "none";
  document.getElementById("bebidas").style.display = "none";
  document.getElementById("extras").style.display = "none";

  document.getElementById(categoria).style.display = "block";
}

function adicionar(nome, preco){
  let itemExistente = carrinho.find(item => item.nome === nome);

  if(itemExistente){
    itemExistente.quantidade += 1;
  } else {
    carrinho.push({nome, preco, quantidade: 1});
  }

  total += preco;
  atualizarTela();
}

function atualizarTela(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  carrinho.forEach(item=>{
    let li = document.createElement("li");
    li.textContent = item.nome + " (" + item.quantidade + "x) - R$ " + (item.preco * item.quantidade);
    lista.appendChild(li);
  });

  document.getElementById("total").textContent = "Total: R$ " + total;
}

function limparCarrinho(){
  carrinho = [];
  total = 0;
  atualizarTela();
}

function adicionarComExtras(botao){
  let produto = botao.parentElement;

  let nome = produto.querySelector("h2").textContent;
  let preco = parseFloat(produto.querySelector("p").textContent.replace("R$ ",""));

  let extras = document.querySelectorAll("#extras input:checked");
  let observacao = produto.querySelector(".obs")?.value || "";

  let nomeFinal = nome;
  let precoFinal = preco;

  let listaExtras = [];

  extras.forEach(extra=>{
    listaExtras.push(extra.value);
    precoFinal += parseFloat(extra.dataset.preco);
  });

  if(listaExtras.length > 0){
    nomeFinal += " | Extras: " + listaExtras.join(", ");
  }

  if(observacao.trim() !== ""){
    nomeFinal += " (" + observacao + ")";
  }

  adicionar(nomeFinal, precoFinal);

  extras.forEach(e => e.checked = false);

  if(produto.querySelector(".obs")){
    produto.querySelector(".obs").value = "";
  }
}
function finalizarPedido(){
  let telefone = "53999816127";

  let mesa = new URLSearchParams(window.location.search).get("mesa") || "Não informada";

  let msg = "Mesa: " + mesa + "\n\nPedido:\n";

  carrinho.forEach(item=>{
    msg += "- " + item.nome + " (" + item.quantidade + "x)\n";
  });

  msg += "\nTotal: R$ " + total;

  let url = `https://wa.me/${telefone}?text=${encodeURIComponent(msg)}`;
  window.open(url);
}
</script>

</body>
</html>
