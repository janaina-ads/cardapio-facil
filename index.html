
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
}

/* TOPO */
h1 {
  background: #25D366;
  color: white;
  padding: 20px;
  margin: 0;
  text-align: center;
}

/* CATEGORIAS */
.categorias {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: white;
  overflow-x: auto;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.categorias button {
  background: #eee;
  border: none;
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  padding: 15px;
  padding-bottom: 260px; /* espaço pro carrinho + botão */
}

/* PRODUTOS */
.produto {
  background: white;
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.produto img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

/* BOTÕES */
button {
  background: #25D366;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  width: 100%;
  margin-top: 10px;
  cursor: pointer;
}

/* CARRINHO */
#carrinho {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 2px solid #ddd;
  z-index: 999;
}

#lista {
  max-height: 100px;
  overflow-y: auto;
}

/* BOTÃO WHATS */
#finalizar {
  position: fixed;
  bottom: 120px;
  right: 15px;
  padding: 15px 20px;
  border-radius: 50px;
  background: #25D366;
  color: white;
  border: none;
  z-index: 1000;
}

/* MOBILE */
@media (max-width: 600px) {
  #finalizar {
    bottom: 140px;
  }
}
</style>
</head>

<body>

<h1>🍔 Lanchonete da Jana</h1>

<!-- CATEGORIAS -->
<div class="categorias">
  <button onclick="mostrar('lanches')">🍔 Lanches</button>
  <button onclick="mostrar('bebidas')">🥤 Bebidas</button>
  <button onclick="mostrar('extras')">➕ Extras</button>
</div>

<div class="container">

<!-- LANCHES -->
<div id="lanches">
<h2>🍔 Lanches</h2>

<div class="produto">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349?w=500">
<h2>X-Burger</h2>
<p>R$ 15</p>
<input type="text" class="obs" placeholder="Observação">
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1606755456206-b25206cde27e?w=500">
<h2>Bauru</h2>
<p>R$ 14</p>
<input type="text" class="obs" placeholder="Observação">
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1551782450-17144efb9c50?w=500">
<h2>Cachorro Quente</h2>
<p>R$ 12</p>
<input type="text" class="obs" placeholder="Observação">
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>
</div>

<!-- BEBIDAS -->
<div id="bebidas" style="display:none">
<h2>🥤 Bebidas</h2>

<div class="produto">
<img src="https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=500">
<h2>Coca-Cola</h2>
<p>R$ 8</p>
<input type="text" class="obs" placeholder="Observação">
<button onclick="adicionarComExtras(this)">Adicionar</button>
</div>
</div>

<!-- EXTRAS -->
<div id="extras" style="display:none">
<h2>➕ Adicionais</h2>

<label><input type="checkbox" value="Queijo" data-preco="2"> Queijo (+2)</label><br>
<label><input type="checkbox" value="Bacon" data-preco="3"> Bacon (+3)</label><br>
<label><input type="checkbox" value="Ovo" data-preco="2"> Ovo (+2)</label>
</div>

</div>

<!-- CARRINHO -->
<div id="carrinho">
<ul id="lista"></ul>
<p id="total">Total: R$ 0</p>
<button onclick="limparCarrinho()">Limpar</button>
</div>

<!-- BOTÃO -->
<button id="finalizar" onclick="finalizarPedido()">📲 Pedir no WhatsApp</button>

<script>
let carrinho = [];
let total = 0;

/* CATEGORIA */
function mostrar(id){
  document.getElementById("lanches").style.display = "none";
  document.getElementById("bebidas").style.display = "none";
  document.getElementById("extras").style.display = "none";

  document.getElementById(id).style.display = "block";
}

/* ADICIONAR */
function adicionar(nome, preco){
  let item = carrinho.find(i => i.nome === nome);

  if(item){
    item.quantidade++;
  } else {
    carrinho.push({nome, preco, quantidade:1});
  }

  total += preco;
  atualizarTela();
}

/* ATUALIZA TELA */
function atualizarTela(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  carrinho.forEach(item=>{
    let li = document.createElement("li");
    li.textContent =
      item.nome + " (" + item.quantidade + "x) - R$ " +
      (item.preco * item.quantidade);

    lista.appendChild(li);
  });

  document.getElementById("total").textContent = "Total: R$ " + total;
}

/* LIMPAR */
function limparCarrinho(){
  carrinho = [];
  total = 0;
  atualizarTela();
}

/* ADICIONAR COM EXTRAS */
function adicionarComExtras(btn){
  try {
    let p = btn.closest(".produto");

    // Buscando h2 (ajuste conforme o que estiver no seu HTML)
    let nomeElemento = p.querySelector("h2");
    if (!nomeElemento) throw new Error("Não encontrei o título do produto.");
    let nome = nomeElemento.textContent;

    // Pega preço e limpa o texto para virar número
    let precoTexto = p.querySelector("p").textContent;
    let preco = Number(precoTexto.replace("R$", "").replace(",", ".").trim());

    let obsInput = p.querySelector(".obs");
    let obs = obsInput ? obsInput.value : "";

    let extras = document.querySelectorAll('#extras input[type="checkbox"]:checked');
    let nomesExtras = [];

    extras.forEach(e => {
      nomesExtras.push(e.value);
      preco += Number(e.dataset.preco || 0);
    });

    if(nomesExtras.length > 0){
      nome += " + " + nomesExtras.join(", ");
    }

    if(obs.trim()){
      nome += " (" + obs + ")";
    }

    adicionar(nome, preco);

    // Limpa os campos após adicionar
    extras.forEach(e => e.checked = false);
    if(obsInput) obsInput.value = "";

  } catch (erro) {
    console.error("Erro detalhado:", erro);
    alert("Erro ao adicionar item. Verifique se o nome do produto está entre tags <h2>");
  }
}
/* FINALIZAR */
function finalizarPedido(){
  let telefone = "53999816127";

  let msg = "Pedido:\n";

  carrinho.forEach(item=>{
    msg += "- " + item.nome + " (" + item.quantidade + "x)\n";
  });

  msg += "\nTotal: R$ " + total;

  let url = `https://wa.me/${telefone}?text=${encodeURIComponent(msg)}`;
  window.open(url);
}
</script>

</body>
</html>
