<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  margin: 0;
}

h1 {
  background: #25D366;
  color: white;
  padding: 20px;
}

.container {
  padding: 20px;
}

.produto {
  background: white;
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 12px;
  display: flex;
  gap: 10px;
}

.produto img {
  width: 120px;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
}

button {
  background: #25D366;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
}

/* BOTÃO WHATS */
#finalizar {
  position: fixed;
  bottom: 100px;
  right: 20px;
  padding: 15px;
  border-radius: 50px;
}
</style>
</head>

<body>

<h1>🍔 Lanchonete da Jana</h1>

<div class="container">

<div class="produto">
  <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
  <div>
    <h2>X-Burger</h2>
    <p>R$ 15</p>
    <button onclick="adicionar('X-Burger',15)">Adicionar</button>
  </div>
</div>

<div class="produto">
  <img src="https://images.unsplash.com/photo-1551782450-17144efb9c50">
  <div>
    <h2>Cachorro Quente</h2>
    <p>R$ 12</p>
    <button onclick="adicionar('Cachorro Quente',12)">Adicionar</button>
  </div>
</div>

</div>

<button id="finalizar" onclick="finalizarPedido()">
📲 Pedir no WhatsApp
</button>

<script>
let carrinho = [];

function adicionar(nome, preco){
  carrinho.push({nome, preco});
}

function finalizarPedido(){
  let telefone = "53999816127";
  let msg = "Olá, quero pedir:\n";

  carrinho.forEach(item=>{
    msg += "- " + item.nome + "\n";
  });

  let url = `https://wa.me/${telefone}?text=${encodeURIComponent(msg)}`;
  window.open(url);
}
</script>

</body>
</html>
